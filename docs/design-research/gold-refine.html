<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cadence — Gold Refinement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@500;700;800&family=Saira+Semi+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0c0c0d;color:#ece4d6;font-family:'Saira',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;padding:46px 32px 90px}
  .h1{font-size:30px;font-weight:800;letter-spacing:-.02em}
  .sub{color:#8c867e;margin:9px 0 30px;font-size:14.5px;max-width:760px;line-height:1.55}
  .sub b{color:#ece4d6;font-weight:600}
  .grid{display:flex;gap:22px;flex-wrap:wrap}
  .tile{background:#161618;border:1px solid #262629;border-radius:18px;padding:22px 18px 16px;
    width:196px;display:flex;flex-direction:column;align-items:center;position:relative}
  .id{position:absolute;top:11px;left:14px;font-size:11px;color:#8c867e;font-weight:700}
  .ring{position:relative;width:128px;height:128px}
  .ring svg{transform:rotate(-90deg);display:block}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .hero{font-family:'Saira Semi Condensed','Saira',sans-serif;font-size:50px;font-weight:800;line-height:.9;letter-spacing:-.02em}
  .unit{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#8c867e;margin-top:5px}
  .cta{display:block;width:100%;text-align:center;margin-top:15px;padding:11px;border-radius:12px;
    font-size:14px;font-weight:700;color:#0c0c0d}
  .name{font-size:13.5px;font-weight:700;margin-top:13px}
  .hx{font-family:ui-monospace,Menlo,monospace;color:#8c867e;font-size:12px;margin-top:3px}
  .ratio{font-size:11px;color:#6f6f74;margin-top:2px}
  .star{color:#E6B24C}
</style>
</head>
<body>
  <h1 class="h1">Cadence — Gold Refinement</h1>
  <p class="sub">All on the locked Onyx base (<b>#0c0c0d</b>) with cream text. Cool champagne → the
  current Cadence Gold (<b>G3 ★</b>) → warm amber/brass. Ring = gold line weight, CTA = gold fill.
  Tell me the <b>id</b> (or "G4 but a hair deeper") and I'll set it as the accent.</p>
  <div class="grid" id="root"></div>
<script>
  function lum(hex){const c=[1,3,5].map(i=>parseInt(hex.substr(i,2),16)/255)
    .map(v=>v<=.03928?v/12.92:((v+.055)/1.055)**2.4);return .2126*c[0]+.7152*c[1]+.0722*c[2];}
  function ratio(a,b){const x=lum(a),y=lum(b),hi=Math.max(x,y),lo=Math.min(x,y);return ((hi+.05)/(lo+.05)).toFixed(1)+':1';}
  const G=[
    {id:'G1', name:'Champagne', hex:'#EAD08A', note:'pale, cool'},
    {id:'G2', name:'Soft Gold', hex:'#E8C268'},
    {id:'G3', name:'Cadence Gold', hex:'#E6B24C', star:true},
    {id:'G4', name:'Marigold', hex:'#EFA836', note:'more saturated'},
    {id:'G5', name:'Amber', hex:'#E09427', note:'warmer'},
    {id:'G6', name:'Honey Brass', hex:'#D69A3C', note:'deeper'},
    {id:'G7', name:'Burnt Gold', hex:'#C9852A', note:'warmest/deep'},
  ];
  const C=2*Math.PI*56;
  document.getElementById('root').innerHTML = G.map(c=>`
    <div class="tile"><div class="id">${c.id}${c.star?' <span class="star">★</span>':''}</div>
      <div class="ring"><svg width="128" height="128" viewBox="0 0 128 128" style="filter:drop-shadow(0 0 10px ${c.hex}66)">
        <circle cx="64" cy="64" r="56" fill="none" stroke="#2a2a2e" stroke-width="9"/>
        <circle cx="64" cy="64" r="56" fill="none" stroke="${c.hex}" stroke-width="9"
          stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C*0.28}"/></svg>
        <div class="num"><div class="hero" style="color:${c.hex}">172</div><div class="unit">steps / min</div></div></div>
      <a class="cta" style="background:${c.hex}">Start run</a>
      <div class="name">${c.name}</div><div class="hx">${c.hex}</div>
      <div class="ratio">${ratio(c.hex,'#0c0c0d')} on bg${c.note?' · '+c.note:''}</div>
    </div>`).join('');
</script>
</body>
</html>
