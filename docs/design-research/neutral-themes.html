<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cadence — Neutral Bases</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800&family=Saira+Semi+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0b;color:#dcdcdf;font-family:'Saira',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;padding:46px 32px 90px}
  .h1{font-size:32px;font-weight:800;letter-spacing:-.02em}
  .sub{color:#86868c;margin:10px 0 30px;font-size:15px;max-width:820px;line-height:1.55}
  .sub b{color:#cfcfd4;font-weight:600}
  .grid{display:flex;gap:26px;flex-wrap:wrap}
  .cell{display:flex;gap:20px;align-items:flex-start;background:#111113;border:1px solid #232327;
    border-radius:20px;padding:22px;width:560px}
  .cell h3{font-size:16px;font-weight:700;margin-bottom:3px}
  .cell .tagline{font-size:12.5px;color:#86868c;margin-bottom:14px;max-width:240px;line-height:1.4}

  .phone{width:248px;border-radius:28px;padding:22px 18px 20px;position:relative;overflow:hidden;
    border:1px solid var(--border);background:var(--bg);flex:none}
  .phone::before{content:'';position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 70% at 50% -8%, var(--halo), transparent 60%)}
  .phone>*{position:relative}
  .status{display:flex;align-items:center;gap:7px;margin-bottom:16px}
  .status .ico{width:13px;height:13px;border-radius:4px;border:2px solid var(--accent)}
  .status .txt{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .status .pip{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .ring{position:relative;width:172px;height:172px;margin:0 auto}
  .ring svg{transform:rotate(-90deg);display:block}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .hero{font-family:'Saira Semi Condensed','Saira',sans-serif;font-size:62px;font-weight:800;
    line-height:.9;letter-spacing:-.02em;color:var(--accent)}
  .ring .unit{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .pulse{animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{filter:drop-shadow(0 0 5px var(--glow))}50%{filter:drop-shadow(0 0 15px var(--glow))}}
  .chip{display:block;width:max-content;margin:12px auto 0;padding:4px 11px;border-radius:50px;
    background:var(--chip);color:var(--accent);font-size:11px;font-weight:700}
  .song{display:flex;align-items:center;gap:10px;margin:18px 2px 0}
  .art{width:40px;height:40px;border-radius:8px;background:var(--art);flex:none;position:relative;overflow:hidden}
  .art::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 25%, var(--accent), transparent 55%);opacity:.45}
  .song .t{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .song .a{font-size:11px;color:var(--muted);margin-top:1px}
  .pos{height:3px;border-radius:2px;background:var(--track);margin-top:8px;overflow:hidden}
  .pos i{display:block;height:100%;width:44%;background:var(--accent);border-radius:2px}
  .cta{display:block;text-align:center;margin-top:16px;padding:13px;border-radius:13px;
    font-size:15px;font-weight:700;background:var(--accent);color:var(--cta)}

  .side{flex:1;min-width:0}
  .sw{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid #1e1e22}
  .sw .box{width:30px;height:22px;border-radius:5px;border:1px solid rgba(255,255,255,.08);flex:none}
  .sw .role{font-size:12px;color:#cfcfd4;width:74px}
  .sw .hx{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#86868c}
  .notes{margin-top:12px;font-size:11.5px;color:#9a9aa0;line-height:1.55}
  .notes code{font-family:ui-monospace,Menlo,monospace;color:#cfcfd4}
  .ok{color:#7fc08a}.warn{color:#d9a23d}
</style>
</head>
<body>
  <h1 class="h1">Cadence — Neutral Bases</h1>
  <p class="sub">Off the brown. <b>Onyx</b> (near-black, cream as the warm hint) and <b>Silver</b>
  (cool light) bases, each with the <b>coral</b> energy or the <b>gold</b> weight you liked.
  George survives as a whisper — cream text, a warm accent — not a brown room. Contrast computed live.</p>
  <div class="grid" id="root"></div>

<script>
  function lum(hex){const c=[1,3,5].map(i=>parseInt(hex.substr(i,2),16)/255)
    .map(v=>v<=.03928?v/12.92:((v+.055)/1.055)**2.4);return .2126*c[0]+.7152*c[1]+.0722*c[2];}
  function ratio(a,b){const x=lum(a),y=lum(b),hi=Math.max(x,y),lo=Math.min(x,y);return (hi+.05)/(lo+.05);}
  const r2=(a,b)=>ratio(a,b).toFixed(1)+':1';
  const g=(v,big)=>v>=(big?3:4.5)?'<span class="ok">AA✓</span>':'<span class="warn">large-only</span>';

  const T=[
    {name:'A · Onyx + Ember', tag:'Black base, cream text, coral energy. Athletic, night-run.',
     t:{bg:'#0c0c0d',surface:'#18181b',border:'#2a2a2e',text:'#ece4d6',muted:'#8c867e',
        accent:'#F0764B',accentDim:'#26211c',track:'#2a2a2e',chip:'#1f1c1a',art:'#241f1b',
        halo:'rgba(240,118,75,.12)',glow:'rgba(240,118,75,.6)',cta:'#0c0c0d'}},
    {name:'B · Onyx + Gold', tag:'Black + cream + gold. The weight you liked, off brown. Reads luxe/athletic.',
     t:{bg:'#0c0c0d',surface:'#18181b',border:'#2a2a2e',text:'#ece4d6',muted:'#8c867e',
        accent:'#E6B24C',accentDim:'#262019',track:'#2a2a2e',chip:'#201c14',art:'#241f15',
        halo:'rgba(230,178,76,.12)',glow:'rgba(230,178,76,.55)',cta:'#0c0c0d'}, rec:true},
    {name:'C · Silver + Ember', tag:'Cool light silver, charcoal text, coral. Clean, morning, friendly.',
     t:{bg:'#e7e8ea',surface:'#f5f6f8',border:'#d3d5d9',text:'#1c1c1f',muted:'#74757b',
        accent:'#DD4F2A',accentDim:'#f0d8cd',track:'#dadce0',chip:'#f3e2da',art:'#dde0e4',
        halo:'rgba(221,79,42,.06)',glow:'rgba(221,79,42,.3)',cta:'#f5f6f8'}},
    {name:'D · Silver + Gold', tag:'Silver base with a deep amber. Warm weight on a cool field.',
     t:{bg:'#e7e8ea',surface:'#f5f6f8',border:'#d3d5d9',text:'#1c1c1f',muted:'#74757b',
        accent:'#A9781A',accentDim:'#efe3c8',track:'#dadce0',chip:'#f1e8d2',art:'#dde0e4',
        halo:'rgba(169,120,26,.06)',glow:'rgba(169,120,26,.3)',cta:'#f5f6f8'}},
  ];

  const C=2*Math.PI*74;
  function card(o){
    const t=o.t;
    return `<div class="cell">
      <div class="phone" style="--bg:${t.bg};--surface:${t.surface};--border:${t.border};--text:${t.text};
        --muted:${t.muted};--accent:${t.accent};--track:${t.track};--chip:${t.chip};--art:${t.art};
        --halo:${t.halo};--glow:${t.glow};--cta:${t.cta}">
        <div class="status"><span class="ico"></span><span class="txt">In the pocket</span><span class="pip"></span></div>
        <div class="ring"><svg width="172" height="172" viewBox="0 0 172 172" class="pulse" style="--glow:${t.glow}">
          <circle cx="86" cy="86" r="74" fill="none" stroke="${t.track}" stroke-width="11"/>
          <circle cx="86" cy="86" r="74" fill="none" stroke="${t.accent}" stroke-width="11"
            stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C*0.28}"/>
        </svg><div class="num"><div class="hero">172</div><div class="unit">steps / min</div></div></div>
        <div class="chip">Matching 172</div>
        <div class="song"><div class="art"></div><div style="flex:1;min-width:0">
          <div class="t">Midnight City</div><div class="a">M83 · 172 BPM</div>
          <div class="pos"><i></i></div></div></div>
        <a class="cta">Start run</a>
      </div>
      <div class="side">
        <h3>${o.name}${o.rec?' <span style="color:#E6B24C;font-size:11px">★</span>':''}</h3>
        <div class="tagline">${o.tag}</div>
        ${[['background',t.bg],['surface',t.surface],['border',t.border],['text',t.text],
           ['muted',t.muted],['accent',t.accent],['accentDim',t.accentDim]]
          .map(([r,h])=>`<div class="sw"><div class="box" style="background:${h}"></div>
            <div class="role">${r}</div><div class="hx">${h}</div></div>`).join('')}
        <div class="notes">accent/bg <code>${r2(t.accent,t.bg)}</code> ${g(ratio(t.accent,t.bg),true)} ·
          text/bg <code>${r2(t.text,t.bg)}</code> ${g(ratio(t.text,t.bg),false)} ·
          CTA label <code>${r2(t.cta,t.accent)}</code> ${g(ratio(t.cta,t.accent),true)}</div>
      </div>
    </div>`;
  }
  document.getElementById('root').innerHTML = T.map(card).join('');
</script>
</body>
</html>
